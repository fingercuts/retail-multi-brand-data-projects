version: '3.8'

services:
  analytics:
    build: .
    container_name: retail_analytics_stack
    volumes:
      - .:/app
    ports:
      - "8501:8501"
    environment:
      - DBT_PROFILES_DIR=/app/dbt_project
    command: streamlit run dashboard/Home.py

  postgres:
    image: postgres:15
    container_name: retail_postgres_serving
    environment:
      - POSTGRES_USER=retail_user
      - POSTGRES_PASSWORD=retail_pass
      - POSTGRES_DB=retail_serving
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  api:
    build: .
    container_name: retail_data_api
    volumes:
      - .:/app
    ports:
      - "8000:8000"
    environment:
      - POSTGRES_HOST=postgres
      - POSTGRES_USER=retail_user
      - POSTGRES_PASSWORD=retail_pass
      - POSTGRES_DB=retail_serving
    command: uvicorn api.main:app --host 0.0.0.0 --port 8000 --reload
    depends_on:
      - postgres

volumes:
  postgres_data:
