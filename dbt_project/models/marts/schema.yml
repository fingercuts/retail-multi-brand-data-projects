version: 2

models:
  - name: fct_sales
    description: "Central fact table for all retail transactions."
    columns:
      - name: transaction_id
        description: "Unique identifier for the transaction."
        tests:
          - unique
          - not_null
      - name: date
        description: "Date of the transaction."
        tests:
          - not_null
      - name: customer_id
        description: "Foreign key to dim_customers."
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_customers')
                field: customer_id
      - name: product_id
        description: "Foreign key to dim_products."
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_products')
                field: product_id
      - name: store_id
        description: "Foreign key to dim_stores."
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_stores')
                field: store_id
      - name: channel_id
        description: "Foreign key to dim_channels."
        tests:
          - relationships:
              arguments:
                to: ref('dim_channels')
                field: channel_id
      - name: units_sold
        description: "Units sold."
        tests:
          - not_null
          - dbt_expectations.expect_column_values_to_be_between:
              arguments:
                min_value: 1
                max_value: 1000
                severity: warn
      - name: total_amount
        description: "Gross revenue amount."
        tests:
          - dbt_expectations.expect_column_values_to_be_between:
              arguments:
                min_value: 0
      - name: net_amount
        description: "Net revenue after discounts."
        tests:
          - dbt_expectations.expect_column_values_to_be_between:
              arguments:
                min_value: 0
    tests:
      - dbt_utils.expression_is_true:
          arguments:
            expression: "total_amount >= net_amount"

  - name: dim_customers
    description: "Dimension table for customer attributes."
    columns:
      - name: customer_id
        tests:
          - unique
          - not_null

  - name: dim_products
    description: "Dimension table for product attributes."
    columns:
      - name: product_id
        tests:
          - unique
          - not_null
      - name: price
        tests:
          - dbt_utils.accepted_range:
              arguments:
                min_value: 0

  - name: dim_stores
    description: "Dimension table for retail stores."
    columns:
      - name: store_id
        tests:
          - unique
          - not_null

  - name: dim_channels
    description: "Dimension table for sales channels."
    columns:
      - name: channel_id
        tests:
          - unique
          - not_null

  - name: dim_promotions
    description: "Dimension table for promotion campaigns."
    columns:
      - name: promotion_id
        tests:
          - unique
          - not_null
