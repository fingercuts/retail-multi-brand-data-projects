repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.4.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-added-large-files

  - repo: https://github.com/sqlfluff/sqlfluff
    rev: 2.3.2
    hooks:
      - id: sqlfluff-lint
        args: [--dialect, duckdb]
        additional_dependencies: [sqlfluff-templater-dbt, dbt-duckdb]
      - id: sqlfluff-fix
        args: [--dialect, duckdb]
        additional_dependencies: [sqlfluff-templater-dbt, dbt-duckdb]
